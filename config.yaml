# SSN v2 — Sequence Similarity Network Pipeline Configuration
# 
# Purpose: Configure the complete SSN pipeline (Python-only):
#   1. Redundancy reduction via clustering
#   2. All-vs-all sequence similarity search
#   3. Interactive network visualization
#
# Usage:
#   python run_ssn.py [--config config.yaml] [--steps all|cluster|search|plot_ssn]
#   python scripts/plot_ssn.py config.yaml

# ══════════════════════════════════════════════════════════════════════════════
# INPUT DATA
# ══════════════════════════════════════════════════════════════════════════════

input_fasta: "/path/to/input.fa"   # Path to FASTA file for analysis
                                           # For foldseek: path to PDB/mmCIF directory
prefix: "ibaj_ssn"                        # Prefix for all output files
output_dir: "/path/to/output/"                      # Directory for all outputs


# ══════════════════════════════════════════════════════════════════════════════
# REDUNDANCY REDUCTION (Clustering)
# ══════════════════════

cluster:
  skip: true                              # Set to true to skip redundancy reduction entirely
                                           # All-vs-all search will run on the full input FASTA
  tool: mmseqs                             # mmseqs | foldseek
  min_seq_id: 0.9                 # Minimum sequence identity (0.0-1.0)
  coverage: 0.9              # Minimum coverage (0.0-1.0)
  cov_mode: 0                              # Coverage mode:
                                           #   0 = bidirectional coverage
                                           #   1 = query coverage
                                           #   2 = target coverage
                                           #   3 = max(query, target) coverage


# ══════════════════════════════════════════════════════════════════════════════
# ALL-VS-ALL SIMILARITY SEARCH
# ══════════════════════════════════════════════════════════════════════════════

search:
  tool: mmseqs                             # mmseqs | foldseek
  sensitivity: 7.5                         # mmseqs sensitivity (1.0-10.0+)
                                           # Higher = more sensitive, slower
                                           # foldseek ignores this parameter
  evalue: 1e-10                            # E-value threshold (mmseqs only)
  results_file: null                       # Path to existing m8 file — skips mmseqs search entirely
                                           # Set to use pre-computed results (e.g. a BLAST m8 file)


# ══════════════════════════════════════════════════════════════════════════════
# ANNOTATION & COLORING
# ══════════════════════════════════════════════════════════════════════════════

annotation:
  meta_file: "/path/to/annotations.domtbl"              # TSV with sequence annotations
                                           # Must have header row
                                           # First column should match sequence IDs
  id_col: "query name"                        # Column name in meta_file that matches
                                           # sequence IDs from input_fasta
  color_col:                               # One or more columns to color nodes by
    - "target name"                        # Creates one plot per color column
  exclude:                                  # Filter out rows from meta_file before annotation
    "target name":                          # Column name to filter on
      - "CBM*"                             # Exclude all CBM domain entries (fnmatch patterns)
  id_mapping_file: null                    # Optional: two-column TSV for ID mapping
                                           # Format: genbank_id ↔ uniprot_id (no header)
                                           # Use if sequence IDs differ between input
                                           # and annotation file
  mmseqs_cluster_file: null                # Auto-populated from cluster step
                                           # Leave as null to auto-detect


# ══════════════════════════════════════════════════════════════════════════════
# SEQUENCE SIMILARITY NETWORK (SSN) PLOTTING
# ══════════════════════════════════════════════════════════════════════════════

ssn:
  threshold:                               # Identity thresholds for separate plots
    - 0.7                                  # 30% identity                                 # 50% identity
    - 0.3                            # 70% identity
  node_size: 4                        # Node marker size (0.1-10.0)
  layout: component_grid                   # Layout: component_grid (fast), lgl, fr, drl, kk, circle, grid
  exclude_singletons: false                 # Exclude one-node connected components from plots
  keep_all_nodes: true                   # Keep all nodes from original data, even those with only below-threshold edges
                                           # When true, nodes that had no edges above the threshold appear as isolated nodes
  scale_node_size: false                   # Scale node area by cluster member count
                                           # (requires mmseqs_cluster_file)


# ══════════════════════════════════════════════════════════════════════════════
# CLUSTERING FOR VISUALIZATION (Optional)
# ══════════════════════════════════════════════════════════════════════════════

clusters:
  min_cluster_size: 2                      # Minimum cluster size for visualization
  color_col: isoelectric_point                            # Column to color clusters by
  size_col: null                           # Column for node size scaling (numeric)
